<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 60" width="120" height="60">
  <!-- Background -->
  <rect width="120" height="60" fill="#FCEAC5" />
  
  <!-- The three intersecting circles -->
  <circle cx="35" cy="30" r="18" fill="none" stroke="#111" stroke-width="3" />
  <circle cx="60" cy="30" r="18" fill="none" stroke="#111" stroke-width="3" />
  <circle cx="85" cy="30" r="18" fill="none" stroke="#111" stroke-width="3" />
  
  <!-- Left circle dot -->
  <circle cx="25" cy="30" r="3.5" fill="#111" />
  
  <!-- Middle circle diamond -->
  <polygon points="60,16 68,30 60,44 52,30" fill="#111" />
  
  <!-- Right circle red crescent -->
  <path d="M 78 30 A 18 18 0 0 1 69 45.5 A 18 18 0 0 0 69 14.5 A 18 18 0 0 1 78 30 Z" fill="#C9442C" />
</svg>