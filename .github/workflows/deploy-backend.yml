name: Deploy Backend to Render

on:
  push:
    branches: ["main"]
    paths:
      - "backend/**"
      - "render.yaml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: render
      url: https://captionforge-api.onrender.com/docs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Trigger Render deploy hook
        # Add your Render Deploy Hook URL as a GitHub secret named RENDER_DEPLOY_HOOK_URL
        # Get it from: Render Dashboard → Service → Settings → Deploy Hook → Copy URL
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          curl -fsSL -X POST "$RENDER_DEPLOY_HOOK_URL"
          echo "Deploy hook triggered successfully."
