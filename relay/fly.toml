# fly.toml — CaptionForge Relay
# Deploy with: fly deploy (from the relay/ directory)
# Docs: https://fly.io/docs/reference/configuration/

app = "captionforge-relay"
primary_region = "iad"   # US-East (Washington DC). Change to "lhr" (London) for EU.

[build]
  # Use the Dockerfile in this directory
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  # RELAY_SECRET_KEY is intentionally NOT set here — use `fly secrets set` instead

[[services]]
  internal_port = 8080
  protocol = "tcp"
  auto_stop_machines = true    # Stop machine when idle (saves free tier hours)
  auto_start_machines = true   # Wake on incoming request
  min_machines_running = 0     # Allow spinning down to zero (free tier)

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443

  [[services.ports]]
    handlers = ["http"]
    port = 80
    force_https = true          # Redirect plain HTTP → HTTPS

  [services.concurrency]
    type = "connections"
    hard_limit = 10
    soft_limit = 5

  [[services.tcp_checks]]
    grace_period = "10s"
    interval = "30s"
    restart_limit = 0
    timeout = "5s"

  [[services.http_checks]]
    grace_period = "15s"
    interval = "30s"
    method = "GET"
    path = "/health"
    protocol = "http"
    timeout = "5s"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256    # yt-dlp without Whisper fits easily in 256 MB
