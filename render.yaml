# yaml-language-server: $schema=
services:
  - type: web
    name: captionforge-api
    runtime: python
    region: oregon          # US-West; change to "frankfurt" for lower EU latency
    plan: free

    # Render free tier runs from repo root, so point it at the backend subfolder
    rootDir: backend

    buildCommand: pip install --upgrade pip && pip install -r requirements.txt

    # Render injects $PORT automatically; we read it here
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT

    healthCheckPath: /

    # ── Environment variables ──────────────────────────────────────────────────
    # Non-secret, safe-to-commit defaults go here.
    # SECRET values (API keys, cookies) must be added via the Render Dashboard
    # under: Service → Environment → Add Environment Variable
    envVars:
      - key: ENV
        value: production

      - key: PYTHON_VERSION
        value: "3.12.3"

      # Whisper settings – tweak as needed
      - key: WHISPER_MODEL
        value: base
      - key: WHISPER_DEVICE
        value: cpu
      - key: WHISPER_COMPUTE_TYPE
        value: int8

      # OpenRouter
      - key: OPENROUTER_MODEL
        value: google/gemma-3-12b-it
      - key: OPENROUTER_BASE_URL
        value: https://openrouter.ai/api/v1
      - key: OPENROUTER_API_KEY
        sync: false          # ← SECRET: add manually on Render Dashboard

      # YouTube download provider chain
      # "auto" tries cobalt → ytmp3 (if RAPIDAPI_KEY set) → yt-dlp
      - key: YT_DOWNLOAD_PROVIDER
        value: auto

      # ── Secrets to add manually on Render Dashboard (leave blank here) ──
      # RAPIDAPI_KEY          — your RapidAPI key for youtube-mp36 (optional)
      # YTDLP_PROXY           — proxy URL for yt-dlp fallback (optional)
      # YOUTUBE_COOKIES       — raw Netscape cookies for yt-dlp (optional)

      # File storage — relative paths resolve inside backend/ on Render
      - key: UPLOAD_DIR
        value: /tmp/captionforge/uploads
      - key: OUTPUT_DIR
        value: /tmp/captionforge/generated_subtitles
      - key: LOG_DIR
        value: /tmp/captionforge/logs
      - key: AUDIO_OUTPUT_DIR
        value: /tmp/captionforge/generated_audio
